<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                    "secondary-fixed-dim": "#ffb59d",
                    "primary-fixed-dim": "#ffb690",
                    "on-tertiary-container": "#3b3121",
                    "tertiary": "#695d4a",
                    "background": "#fcf9f8",
                    "inverse-surface": "#313030",
                    "tertiary-container": "#a79883",
                    "on-tertiary-fixed-variant": "#504534",
                    "on-secondary-fixed": "#390c00",
                    "inverse-primary": "#ffb690",
                    "surface-variant": "#e5e2e1",
                    "primary-fixed": "#ffdbca",
                    "on-surface-variant": "#584237",
                    "surface-container": "#f0edec",
                    "on-secondary-container": "#5d1900",
                    "surface-dim": "#dcd9d9",
                    "on-tertiary": "#ffffff",
                    "primary": "#9d4300",
                    "surface-bright": "#fcf9f8",
                    "on-primary-container": "#582200",
                    "on-background": "#1c1b1b",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#f3f0ef",
                    "tertiary-fixed": "#f2e0c8",
                    "outline-variant": "#e0c0b1",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f6f3f2",
                    "on-primary-fixed-variant": "#783200",
                    "surface-tint": "#9d4300",
                    "tertiary-fixed-dim": "#d5c4ad",
                    "on-primary-fixed": "#341100",

<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #f97316 !important;
            ring: 0 !important;
        }
        .scroll-container {
            padding-bottom: 120px; /* Space for the fixed bottom action or nav */
        }
        /* Custom scrollbar for a cleaner mobile look if viewed on desktop */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #fcf9f8;
        }
        ::-webkit-scrollbar-thumb {
            background: #e5e2e1;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-surface border-b border-surface-container-highest">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:opacity-80">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="ml-2 font-headline-md text-headline-md font-bold text-on-surface">Student Information</h1>
</header>
<main class="pt-20 px-6 max-w-md mx-auto scroll-container">
<!-- Hero Branding Section (Momentum Narrative style) -->
<div class="mb-10 text-center">
<div class="inline-block px-3 py-1 mb-4 rounded-lg bg-[#FFEDD5] text-[#C2410C] font-label-md text-label-md tracking-wider uppercase">
                Academic Year Update
            </div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Unifast Portal</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please ensure all details match your official documents for successful validation.</p>
</div>
<form class="space-y-6">
<!-- Text Inputs -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">TES Award No.</label>
<input class="w-full px-4 py-4 rounded-lg bg-surface-container-lowest border border-surface-container-highest text-body-md font-body-md transition-all placeholder:text-outline focus:border-primary-container" placeholder="e.g. TES-2024-XXXX" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Student ID</label>
<input class="w-full px-4 py-4 rounded-lg bg-surface-container-lowest border border-surface-container-highest text-body-md font-body-md transition-all placeholder:text-outline focus:border-primary-container" placeholder="Enter your University ID" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Batch No.</label>
<input class="w-full px-4 py-4 rounded-lg bg-surface-container-lowest border border-surface-container-highest text-body-md font-body-md transition-all placeholder:text-outline focus:border-primary-container" placeholder="e.g. Batch 7" type="text"/>
</div>
<!-- Dropdowns -->
<div class="grid grid-cols-1 gap-6">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Status</label>
<div class="relative">
<select class="appearance-none w-full px-4 py-4 rounded-lg bg-surface-container-lowest border border-surface-container-highest text-body-md font-body-md transition-all focus:border-primary-container">
<option disabled="" selected="" value="">Select Status</option>
<option>Validated</option>
<option>Pending</option>
<option>Rejected</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Semester</label>
<div class="relative">
<select class="appearance-none w-full px-4 py-4 rounded-lg bg-surface-container-lowest border border-surface-container-highest text-body-md font-body-md transition-all focus:border-primary-container">
<option disabled="" selected="" value="">Select Semester</option>
<option>1st Semester</option>
<option>2nd Semester</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">School Year</label>
<div class="relative">
<select class="appearance-none w-full px-4 py-4 rounded-lg bg-surface-container-lowest border border-surface-container-highest text-body-md font-body-md transition-all focus:border-primary-container">
<option disabled="" selected="" value="">Select School Year</option>
<option>2023-2024</option>
<option>2024-2025</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<!-- File Upload Sections -->
<div class="pt-4 space-y-6">
<div class="space-y-3">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Upload Colord copy of School ID ( fornt and back ) with 3 signature and batch No.</label>
<div class="relative group cursor-pointer border-2 border-dashed border-surface-container-highest rounded-lg p-8 flex flex-col items-center justify-center bg-surface-container-low transition-colors hover:bg-surface-container-high" onclick="document.getElementById('file-front').click()">
<input class="hidden" id="file-front" type="file"/>
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary-container">id_card</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">Tap to upload Front ID</span>
<span class="text-[12px] text-on-surface-variant mt-1">PNG, JPG up to 5MB</span>
</div>
</div>
<div class="space-y-3">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Upload Back ID</label>
<div class="relative group cursor-pointer border-2 border-dashed border-surface-container-highest rounded-lg p-8 flex flex-col items-center justify-center bg-surface-container-low transition-colors hover:bg-surface-container-high" onclick="document.getElementById('file-back').click()">
<input class="hidden" id="file-back" type="file"/>
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary-container">contact_page</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">Tap to upload Back ID</span>
<span class="text-[12px] text-on-surface-variant mt-1">PNG, JPG up to 5MB</span>
</div>
</div>
</div>
</form>
</main> 
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-surface/80 backdrop-blur-md border-t border-surface-container-highest">
<button class="w-full bg-primary-container text-on-primary font-headline-md text-[18px] py-4 rounded-lg shadow-sm hover:bg-secondary active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<span>Save Information</span>
<span class="material-symbols-outlined">check_circle</span>
</button>
</div>
<!-- Bottom Navigation (Hidden on forms usually, but following Predicted Components instruction for mobile destinations) -->
<!-- Suppressing per "The UX Goal" in system instructions: "If the user is in a focused journey... hide the shell" -->
<script>
        // Micro-interactions for file upload visual feedback
        const fileInputs = ['file-front', 'file-back'];
        fileInputs.forEach(id => {
            const input = document.getElementById(id);
            input.addEventListener('change', function(e) {
                if(this.files && this.files[0]) {
                    const labelSpan = this.parentElement.querySelector('.font-label-md');
                    labelSpan.innerText = 'File selected: ' + this.files[0].name;
                    labelSpan.classList.add('text-secondary');
                    this.parentElement.classList.add('border-primary-container');
                    this.parentElement.classList.remove('border-dashed');
                }
            });
        });
    </script>
</body></html>
